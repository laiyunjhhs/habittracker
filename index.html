<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="好習慣">
<meta name="theme-color" content="#F4F1EC">
<title>好習慣 — 每日習慣追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    /* Brand palette from #2D5273 #54728C #545928 #A2A63C #D9CDBF */
    --navy:#2D5273;    /* dark blue — primary actions, headings */
    --steel:#54728C;   /* mid blue — secondary, icons */
    --moss:#545928;    /* dark olive */
    --lime:#A2A63C;    /* bright olive — accents */
    --sand:#D9CDBF;    /* warm beige — backgrounds */
    /* Extended blue ramp */
    --blue-50:#EBF1F6;
    --blue-100:#C2D5E4;
    --blue-200:#99B9D2;
    --blue-400:#54728C;
    --blue-500:#3D5F7A;
    --blue-600:#2D5273;
    --blue-700:#1E3D58;
    --blue-800:#142C40;
    /* Extended olive ramp */
    --olive-50:#F3F4E8;
    --olive-100:#DDE0B0;
    --olive-200:#C1C57A;
    --olive-400:#A2A63C;
    --olive-600:#545928;
    /* Neutrals */
    --gray-50:#F7F5F2;
    --gray-100:#EDE9E3;
    --gray-200:#D9CDBF;
    --gray-300:#C2B9AC;
    --gray-400:#9B9189;
    --gray-600:#6B6259;
    --gray-800:#3A3530;
    /* Semantic */
    --purple:#7F77DD;--teal:#1D9E75;
    --bg:#F4F1EC;--surface:#FFFFFF;--text:#1E2A35;--muted:#637080;
    --border:rgba(45,82,115,0.12);--radius:16px;--radius-sm:10px;
    --shadow:0 2px 14px rgba(45,82,115,0.09);
    --font:'Noto Sans TC',sans-serif;
  }
  body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;max-width:430px;margin:0 auto;overflow-x:hidden;}
  .screen{display:none;flex-direction:column;min-height:100dvh;padding-bottom:80px;}
  .screen.active{display:flex;}
  .scroll-area{flex:1;overflow-y:auto;padding:0 16px 16px;}
  .topbar{position:sticky;top:0;z-index:10;background:var(--bg);padding:18px 16px 11px;border-bottom:1px solid var(--border);}
  .topbar-row{display:flex;align-items:center;justify-content:space-between;}
  .app-title{font-size:22px;font-weight:700;color:var(--navy);letter-spacing:-0.5px;}
  .date-chip{font-size:12px;color:var(--navy);font-weight:500;background:var(--blue-50);border:1px solid var(--blue-100);border-radius:20px;padding:4px 12px;}
  .greeting{font-size:13px;color:var(--muted);margin-top:3px;}

  /* Quote */
  .quote-card{margin:16px 0 0;background:linear-gradient(135deg,var(--navy) 0%,var(--steel) 100%);border-radius:var(--radius);padding:18px 20px;color:white;position:relative;overflow:hidden;}
  .quote-card::before{content:'"';position:absolute;top:-14px;left:8px;font-size:110px;opacity:0.1;font-family:Georgia,serif;line-height:1;}
  .quote-tag{font-size:10px;font-weight:700;letter-spacing:0.1em;opacity:0.7;text-transform:uppercase;margin-bottom:8px;}
  .quote-text{font-size:15px;font-weight:500;line-height:1.65;position:relative;z-index:1;}
  .quote-source{font-size:11px;opacity:0.6;margin-top:8px;text-align:right;}
  .quote-refresh{position:absolute;top:13px;right:13px;background:rgba(255,255,255,0.15);border:none;border-radius:8px;padding:5px 9px;cursor:pointer;color:white;font-family:var(--font);font-size:11px;}

  /* Progress */
  .progress-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 18px;margin:12px 0;display:flex;align-items:center;gap:16px;box-shadow:var(--shadow);}
  .ring-wrap{position:relative;flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
  .ring-pct{font-size:17px;font-weight:700;color:var(--navy);}
  .ring-sub{font-size:10px;color:var(--muted);}
  .progress-info{flex:1;}
  .progress-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:3px;}
  .progress-sub{font-size:13px;color:var(--muted);}
  .streak-row{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
  .streak-chip{font-size:11px;font-weight:600;color:var(--navy);background:var(--blue-50);border:1px solid var(--blue-100);border-radius:20px;padding:3px 10px;}

  /* Section */
  .section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin:18px 0 9px;}

  /* Habits */
  .habit-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);border-left-width:4px;padding:12px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:transform 0.12s,box-shadow 0.12s;user-select:none;}
  .habit-card.done{background:var(--blue-50);border-color:var(--blue-100);}
  .habit-card.dragging{opacity:0.4;}
  .habit-card.drag-over{box-shadow:0 -3px 0 var(--navy);}
  .drag-handle{width:18px;height:28px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:grab;opacity:0.3;touch-action:none;}
  .drag-handle span{display:block;width:12px;height:1.5px;background:var(--muted);border-radius:2px;}
  .check-btn{width:27px;height:27px;border-radius:50%;border:2px solid var(--gray-200);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.18s;cursor:pointer;}
  .habit-card.done .check-btn{background:var(--navy);border-color:var(--navy);}
  .check-icon{opacity:0;transition:opacity 0.15s;}
  .habit-card.done .check-icon{opacity:1;}
  .habit-body{flex:1;min-width:0;cursor:pointer;}
  .habit-name{font-size:14px;font-weight:500;color:var(--text);}
  .habit-card.done .habit-name{color:var(--navy);}
  .habit-note-preview{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px;}
  .habit-meta{display:flex;gap:5px;align-items:center;margin-top:3px;flex-wrap:wrap;}
  .habit-time{font-size:11px;color:var(--muted);}
  .freq-badge{font-size:10px;font-weight:700;color:white;border-radius:20px;padding:2px 7px;}
  .freq-daily{background:var(--steel);}
  .freq-weekly{background:var(--moss);}
  .freq-monthly{background:var(--lime);color:#2a2c12;}

  .habit-actions{display:flex;gap:2px;flex-shrink:0;}
  .habit-btn{width:27px;height:27px;border:none;background:transparent;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--gray-400);}
  .habit-btn:hover{background:var(--gray-100);}
  .habit-btn.del:hover{color:#E24B4A;}
  /* Color picker */
  .color-picker-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .color-swatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform 0.15s,border-color 0.15s;}
  .color-swatch.selected{border-color:var(--gray-800);transform:scale(1.12);}
  /* Note */
  .modal-textarea{width:100%;font-family:var(--font);font-size:14px;border:1.5px solid var(--border);border-radius:10px;padding:10px 13px;outline:none;background:var(--bg);color:var(--text);margin-bottom:10px;resize:none;height:72px;line-height:1.5;}
  .modal-textarea:focus{border-color:var(--navy);}





  /* Todo */
  .todo-cat-tabs{display:flex;gap:0;margin-top:14px;margin-bottom:14px;background:var(--gray-100);border-radius:var(--radius-sm);padding:3px;}
  .todo-cat-tab{flex:1;padding:8px 4px;text-align:center;font-size:13px;font-weight:600;color:var(--muted);border-radius:8px;cursor:pointer;transition:all 0.18s;}
  .todo-cat-tab.active{background:var(--surface);color:var(--navy);box-shadow:0 1px 4px rgba(45,82,115,0.1);}
  .todo-input-row{display:flex;gap:8px;margin-bottom:10px;}
  .todo-input{flex:1;font-family:var(--font);font-size:14px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 13px;outline:none;background:var(--surface);color:var(--text);}
  .todo-input:focus{border-color:var(--navy);}
  .todo-add-btn{padding:10px 15px;background:var(--navy);color:white;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;}
  .todo-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px;}
  .todo-item.done-todo{opacity:0.5;}
  .todo-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--gray-200);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.15s;}
  .todo-item.done-todo .todo-check{background:var(--navy);border-color:var(--navy);}
  .todo-text{flex:1;font-size:14px;color:var(--text);}
  .todo-item.done-todo .todo-text{text-decoration:line-through;color:var(--muted);}
  .todo-del{width:22px;height:22px;border:none;background:transparent;cursor:pointer;color:var(--gray-400);font-size:16px;display:flex;align-items:center;justify-content:center;border-radius:6px;flex-shrink:0;}
  .todo-del:hover{color:#E24B4A;}
  .todo-empty{text-align:center;padding:24px;color:var(--muted);font-size:13px;}
  .todo-cat-badge{display:inline-block;font-size:10px;font-weight:700;border-radius:20px;padding:2px 7px;margin-left:6px;vertical-align:middle;}
  .badge-today{background:var(--blue-50);color:var(--navy);}
  .badge-other{background:#EAF3DE;color:#3B6D11;}

  /* Stats */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px;}
  .stat-num{font-size:26px;font-weight:700;color:var(--navy);}
  .stat-label{font-size:12px;color:var(--muted);margin-top:2px;}
  .stat-card.wide{grid-column:span 2;}
    /* Calendar heatmap */
  .cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .cal-month-label{font-size:14px;font-weight:700;color:var(--navy);}
  .cal-nav{background:none;border:none;cursor:pointer;color:var(--steel);padding:4px 8px;border-radius:8px;font-size:16px;font-family:var(--font);}
  .cal-nav:hover{background:var(--blue-50);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-day-hdr{font-size:10px;font-weight:700;color:var(--muted);text-align:center;padding:2px 0;}
  .cal-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;cursor:default;position:relative;}
  .cal-cell.empty{background:transparent;}
  .cal-cell.no-data{background:var(--gray-100);color:var(--gray-400);}
  .cal-cell.pct-0{background:var(--gray-100);color:var(--gray-400);}
  .cal-cell.pct-low{background:var(--blue-100);color:var(--blue-700);}
  .cal-cell.pct-mid{background:var(--blue-200);color:var(--blue-800);}
  .cal-cell.pct-high{background:var(--blue-400);color:white;}
  .cal-cell.pct-full{background:var(--navy);color:white;}
  .cal-cell.is-today{box-shadow:0 0 0 2px var(--lime);}
  .cal-cell.future{background:transparent;color:var(--gray-200);}
  .cal-legend{display:flex;align-items:center;gap:6px;margin-top:10px;justify-content:flex-end;}
  .cal-legend-label{font-size:10px;color:var(--muted);}
  .cal-legend-dot{width:12px;height:12px;border-radius:3px;}

  /* Settings */
  .settings-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:14px;}
  .settings-row{display:flex;align-items:center;gap:11px;padding:12px 14px;border-bottom:1px solid var(--border);}
  .settings-row:last-child{border-bottom:none;}
  .settings-icon{width:32px;height:32px;border-radius:9px;background:var(--blue-50);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .settings-body{flex:1;}
  .settings-label{font-size:14px;font-weight:500;color:var(--text);}
  .settings-sub{font-size:12px;color:var(--muted);margin-top:1px;}
  .toggle{position:relative;width:44px;height:26px;flex-shrink:0;}
  .toggle input{opacity:0;width:0;height:0;position:absolute;}
  .toggle-track{position:absolute;inset:0;border-radius:13px;background:var(--gray-200);cursor:pointer;transition:background 0.2s;}
  .toggle input:checked+.toggle-track{background:var(--navy);}
  .toggle-thumb{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:white;box-shadow:0 1px 4px rgba(0,0,0,0.2);transition:transform 0.2s;}
  .toggle input:checked~.toggle-thumb{transform:translateX(18px);}
  .time-input{font-family:var(--font);font-size:14px;font-weight:500;color:var(--navy);background:var(--blue-50);border:1px solid var(--blue-100);border-radius:8px;padding:6px 9px;cursor:pointer;outline:none;}
  .remind-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;}
  .remind-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
  .remind-name{font-size:14px;font-weight:500;flex:1;}
  .remind-row{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
  .remind-label{font-size:13px;color:var(--muted);}
  .perm-banner{background:#FFF8E1;border:1px solid #FFE082;border-radius:var(--radius-sm);padding:11px 13px;display:flex;align-items:center;gap:9px;margin-bottom:12px;}
  .perm-text{flex:1;font-size:13px;color:#7a5800;}
  .perm-btn{font-size:12px;font-weight:700;padding:6px 12px;background:#F59E0B;color:white;border:none;border-radius:8px;cursor:pointer;}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(10,20,40,0.45);backdrop-filter:blur(4px);align-items:flex-end;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal-sheet{background:var(--surface);border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:430px;animation:slideUp 0.25s ease;}
  @keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
  .modal-title{font-size:17px;font-weight:700;margin-bottom:14px;}
  .modal-input{width:100%;font-family:var(--font);font-size:15px;border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;outline:none;background:var(--bg);color:var(--text);margin-bottom:10px;}
  .modal-input:focus{border-color:var(--navy);}
  .modal-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;}
  .freq-row{display:flex;gap:7px;margin-bottom:12px;}
  .freq-opt{flex:1;padding:9px 4px;text-align:center;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:13px;font-weight:600;color:var(--muted);background:var(--bg);cursor:pointer;transition:all 0.15s;}
  .freq-opt.selected{border-color:var(--navy);color:var(--navy);background:var(--blue-50);}
  .modal-row{display:flex;gap:10px;}
  .modal-btn{flex:1;padding:13px;border-radius:12px;border:none;font-family:var(--font);font-size:15px;font-weight:600;cursor:pointer;}
  .modal-btn.cancel{background:var(--gray-100);color:var(--muted);}
  .modal-btn.save{background:var(--navy);color:white;}
  .add-fab{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;margin-top:2px;border:2px dashed var(--blue-100);border-radius:var(--radius);background:transparent;color:var(--steel);font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;}
  .add-fab:active{background:var(--blue-50);}

  /* Toast */
  .toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--gray-800);color:white;font-size:13px;font-weight:500;padding:10px 20px;border-radius:20px;white-space:nowrap;opacity:0;transition:all 0.3s;pointer-events:none;z-index:200;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* Nav */
  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--surface);border-top:1px solid var(--border);display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom));z-index:50;}
  .nav-tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;padding:4px 0;}
  .nav-icon{color:var(--gray-400);transition:color 0.15s;}
  .nav-label{font-size:10px;color:var(--gray-400);transition:color 0.15s;}
  .nav-tab.active .nav-icon,.nav-tab.active .nav-label{color:var(--navy);font-weight:700;}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="topbar">
    <div class="topbar-row">
      <div class="app-title">好習慣</div>
      <div class="date-chip" id="date-chip"></div>
    </div>
    <div class="greeting" id="greeting-text"></div>
  </div>
  <div class="scroll-area">
    <div class="quote-card">
      <div class="quote-tag" id="quote-tag">今日語錄</div>
      <div class="quote-text" id="quote-text"></div>
      <div class="quote-source" id="quote-source"></div>
      <button class="quote-refresh" onclick="nextQuote()">換一句</button>
    </div>
    <div class="progress-card">
      <div class="ring-wrap">
        <svg width="66" height="66" viewBox="0 0 66 66">
          <circle cx="33" cy="33" r="26" fill="none" stroke="var(--blue-50)" stroke-width="5.5"/>
          <circle id="ring-circle" cx="33" cy="33" r="26" fill="none" stroke="var(--navy)" stroke-width="5.5" stroke-dasharray="163" stroke-dashoffset="163" stroke-linecap="round"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ring-pct">0%</div>
          <div class="ring-sub">完成</div>
        </div>
      </div>
      <div class="progress-info">
        <div class="progress-title" id="prog-title">今日習慣</div>
        <div class="progress-sub" id="prog-sub">加油！</div>
        <div class="streak-row">
          <div class="streak-chip" id="best-streak">最長 0天</div>
          <div class="streak-chip" id="today-done">0/0</div>
        </div>
      </div>
    </div>
    <div class="section-label">今日習慣</div>
    <div id="habit-list"></div>
    <button class="add-fab" onclick="openModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      新增習慣
    </button>


  </div>
</div>

<!-- TODO -->
<div class="screen" id="screen-todo">
  <div class="topbar">
    <div class="topbar-row"><div class="app-title">待辦清單</div><div class="date-chip" id="todo-date-chip"></div></div>
    <div class="greeting" id="todo-sub">今天要做什麼？</div>
  </div>
  <div class="scroll-area">
    <div class="todo-cat-tabs">
      <div class="todo-cat-tab active" id="tab-today" onclick="switchTodoCat('today')">今日待辦</div>
      <div class="todo-cat-tab" id="tab-other" onclick="switchTodoCat('other')">其他待辦</div>
    </div>
    <div class="todo-input-row">
      <input class="todo-input" id="todo-input" placeholder="新增待辦事項…" maxlength="50">
      <button class="todo-add-btn" onclick="addTodo()">新增</button>
    </div>
    <div id="todo-list"></div>
    <div id="todo-done-section"></div>
  </div>
</div>

<!-- STATS -->
<div class="screen" id="screen-stats">
  <div class="topbar"><div class="topbar-row"><div class="app-title">統計</div></div><div class="greeting">追蹤你的進步</div></div>
  <div class="scroll-area">
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-num" id="stat-streak">0</div><div class="stat-label">目前最長連續</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-best">0</div><div class="stat-label">歷史最長紀錄</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-rate">0%</div><div class="stat-label">本週完成率</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">累計打卡次數</div></div>

<div class="toast" id="toast"></div>

<script>
const QUOTES=[
  {text:"做自己喜歡的事，喜歡自己在做的事。",source:"SEVENTEEN — 《CLAP》",type:"seventeen"},
  {text:"即使跌倒了也沒關係，再次站起來就好。",source:"SEVENTEEN — 《Don't Wanna Cry》",type:"seventeen"},
  {text:"不要因為走得慢而氣餒，只要不停下腳步就好。",source:"SEVENTEEN — 《아낀다》",type:"seventeen"},
  {text:"我相信我，相信你，相信我們。",source:"SEVENTEEN — 《Adore U》",type:"seventeen"},
  {text:"在最黑暗的時候，找到光，那就是我們。",source:"SEVENTEEN — 《Fear》",type:"seventeen"},
  {text:"每一個今天，都是明天的基礎。",source:"SEVENTEEN — 《Home》",type:"seventeen"},
  {text:"不管多難，我都選擇繼續。",source:"SEVENTEEN — 《Ready to love》",type:"seventeen"},
  {text:"我不完美，但我在努力成為更好的自己。",source:"SEVENTEEN — 《Bout You》",type:"seventeen"},
  {text:"一起的時候最閃耀。",source:"SEVENTEEN — 《Shining Diamond》",type:"seventeen"},
  {text:"只要你在身邊，我就什麼都不怕。",source:"SEVENTEEN — 《You Make My Day》",type:"seventeen"},
  {text:"夢想不是用來等待的，是用來追逐的。",source:"激勵語錄",type:"motivational"},
  {text:"每一小步，都在讓你離目標更近一點。",source:"激勵語錄",type:"motivational"},
  {text:"今天的堅持，是明天的自己最好的禮物。",source:"激勵語錄",type:"motivational"},
  {text:"你不需要完美，你只需要今天比昨天好一點。",source:"激勵語錄",type:"motivational"},
  {text:"習慣的力量，比任何動力都持久。",source:"激勵語錄",type:"motivational"},
  {text:"給自己一個理由繼續，而不是一個理由放棄。",source:"激勵語錄",type:"motivational"},
  {text:"你已經比昨天更好了，繼續前進。",source:"激勵語錄",type:"motivational"},
  {text:"困難不是終點，而是轉折點。",source:"激勵語錄",type:"motivational"},
];

const KEY='habit_tracker_v3';
let state=loadState();

function defaultState(){
  return{
    habits:[
      {id:1,name:"喝 2000ml 水",freq:"daily",time:"08:00",color:"#2D5273",note:"保持身體水份充足",streak:7,best:7,totalDone:42,done:false,notify:true},
      {id:2,name:"冥想 10 分鐘",freq:"daily",time:"07:30",color:"#7F77DD",note:"靜心，提升專注力",streak:12,best:12,totalDone:60,done:false,notify:true},
      {id:3,name:"閱讀 30 分鐘",freq:"daily",time:"21:00",color:"#545928",note:"持續學習，每天進步一點點",streak:5,best:8,totalDone:30,done:false,notify:true},
      {id:4,name:"每週運動 3 次",freq:"weekly",time:"18:00",color:"#A2A63C",note:"健康的身體是一切的基礎",streak:3,best:5,totalDone:20,done:false,notify:true},
      {id:5,name:"每月回顧",freq:"monthly",time:"09:00",color:"#54728C",note:"回顧成長，調整目標方向",streak:2,best:3,totalDone:6,done:false,notify:false},
    ],
    todos:[],
    weekHistory:[4,3,4,2,4,3,0],
    lastDate:new Date().toDateString(),
    dailyTime:"21:00",sleepTime:"22:00",
    globalNotify:false,nextId:6,
    quoteIdx:Math.floor(Math.random()*QUOTES.length),
    quoteDate:''
  };
}
function loadState(){try{const s=localStorage.getItem(KEY);return s?JSON.parse(s):defaultState();}catch(e){return defaultState();}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));}catch(e){}}

const DAY=['日','一','二','三','四','五','六'];
const MON=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

function checkNewDay(){
  const today=new Date().toDateString();
  if(state.lastDate!==today){
    const cnt=state.habits.filter(h=>h.done&&h.freq==='daily').length;
    state.weekHistory=[...state.weekHistory.slice(1),cnt];
    state.habits.forEach(h=>{
      if(h.done){h.streak++;if(h.streak>h.best)h.best=h.streak;h.totalDone++;}
      else if(h.freq==='daily'){h.streak=0;}
      h.done=false;
    });
    state.todos=state.todos.filter(t=>!(t.done&&(t.cat==='today'||!t.cat)));
    // Record completed count in calendar history
    if(!state.calHistory)state.calHistory={};
    const yesterday=new Date();yesterday.setDate(yesterday.getDate()-1);
    const yk=`${yesterday.getFullYear()}-${String(yesterday.getMonth()+1).padStart(2,'0')}-${String(yesterday.getDate()).padStart(2,'0')}`;
    const yCnt=state.habits.filter(h=>h.freq==='daily').filter(h=>h.done).length;
    state.calHistory[yk]=yCnt;
    state.lastDate=today;save();
  }
  if(state.quoteDate!==new Date().toDateString()){
    state.quoteIdx=Math.floor(Math.random()*QUOTES.length);
    state.quoteDate=new Date().toDateString();save();
  }
}

function renderQuote(){
  const q=QUOTES[state.quoteIdx];
  document.getElementById('quote-text').textContent=q.text;
  document.getElementById('quote-source').textContent='— '+q.source;
  document.getElementById('quote-tag').textContent=q.type==='seventeen'?'SEVENTEEN 歌詞':'今日語錄';
}
function nextQuote(){state.quoteIdx=(state.quoteIdx+1)%QUOTES.length;save();renderQuote();}

function renderHome(){
  const now=new Date();
  document.getElementById('date-chip').textContent=`${MON[now.getMonth()]} ${now.getDate()}日 (${DAY[now.getDay()]})`;
  const h=now.getHours();
  document.getElementById('greeting-text').textContent=h<5?'深夜了，好好休息':h<12?'早安！新的一天開始':h<17?'午安！持續前進':h<21?'晚安！收尾時刻':'準備好明天了嗎？';
  const daily=state.habits.filter(h=>h.freq==='daily');
  const done=daily.filter(h=>h.done).length,total=daily.length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('ring-circle').style.strokeDashoffset=163-(163*pct/100);
  document.getElementById('ring-pct').textContent=pct+'%';
  document.getElementById('today-done').textContent=`${done}/${total}`;
  const best=Math.max(0,...state.habits.map(h=>h.best),0);
  document.getElementById('best-streak').textContent=`最長 ${best}天`;
  document.getElementById('prog-title').textContent=done===total&&total>0?'今日全部完成！':'今日習慣';
  document.getElementById('prog-sub').textContent=done===total&&total>0?'太棒了，繼續保持！':`還有 ${total-done} 個待完成`;

  const list=document.getElementById('habit-list');
  list.innerHTML='';
  const FL={daily:'每天',weekly:'每週',monthly:'每月'};
  const FC={daily:'freq-daily',weekly:'freq-weekly',monthly:'freq-monthly'};
  state.habits.forEach(habit=>{
    const card=document.createElement('div');
    card.className='habit-card'+(habit.done?' done':'');
    const col=habit.color||'#378ADD';
    card.style.borderLeftColor=col;
    card.setAttribute('data-id',habit.id);
    card.draggable=true;
    const noteHtml=habit.note?`<div class="habit-note-preview" title="${habit.note}">${habit.note}</div>`:'';
    card.innerHTML=`
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <div class="check-btn" onclick="toggleHabit(${habit.id},event)"><svg class="check-icon" width="11" height="9" viewBox="0 0 11 9"><path d="M1 4.5L4.5 8L10 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="habit-body" onclick="toggleHabit(${habit.id},event)">
        <div class="habit-name">${habit.name}</div>
        ${noteHtml}
        <div class="habit-meta"><span class="freq-badge ${FC[habit.freq]}">${FL[habit.freq]}</span><span class="habit-time">${habit.time}</span></div>
      </div>
      <div class="habit-actions">
        <button class="habit-btn" onclick="openModal(${habit.id})" title="編輯"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
        <button class="habit-btn del" onclick="deleteHabit(${habit.id})" title="刪除"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/></svg></button>
      </div>`;
    // drag events
    card.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',habit.id);card.classList.add('dragging');});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.habit-card').forEach(c=>c.classList.remove('drag-over'));});
    card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('drag-over');
      const fromId=parseInt(e.dataTransfer.getData('text/plain'));
      const toId=habit.id;
      if(fromId===toId)return;
      const fi=state.habits.findIndex(h=>h.id===fromId);
      const ti=state.habits.findIndex(h=>h.id===toId);
      const [moved]=state.habits.splice(fi,1);
      state.habits.splice(ti,0,moved);
      save();renderHome();
    });
    list.appendChild(card);
  });


}

function toggleHabit(id,e){if(e)e.stopPropagation();const h=state.habits.find(x=>x.id===id);if(!h)return;h.done=!h.done;if(h.done)showToast('✓ 打卡成功！');save();renderHome();renderStats();}
function deleteHabit(id){if(!confirm('確定刪除這個習慣？'))return;state.habits=state.habits.filter(x=>x.id!==id);save();renderHome();renderStats();renderReminders();}

let todoCat='today';
function switchTodoCat(cat){
  todoCat=cat;
  document.getElementById('tab-today').classList.toggle('active',cat==='today');
  document.getElementById('tab-other').classList.toggle('active',cat==='other');
  document.getElementById('todo-input').placeholder=cat==='today'?'新增今日待辦…':'新增其他待辦…';
  renderTodo();
}
function renderTodo(){
  const now=new Date();
  document.getElementById('todo-date-chip').textContent=`${MON[now.getMonth()]} ${now.getDate()}日`;
  const catTodos=state.todos.filter(t=>t.cat===todoCat);
  const p=catTodos.filter(t=>!t.done).length;
  const subMap={today:['今日待辦都完成了！','今天要做什麼？',`還有 ${p} 件今日待辦`],other:['其他待辦都完成了！','有什麼其他事項？',`還有 ${p} 件其他待辦`]};
  const s=subMap[todoCat];
  document.getElementById('todo-sub').textContent=p===0&&catTodos.length>0?s[0]:p===0?s[1]:s[2];
  const tl=document.getElementById('todo-list');tl.innerHTML='';
  const pending=catTodos.filter(t=>!t.done);
  const doneT=catTodos.filter(t=>t.done);
  if(!pending.length&&!doneT.length){
    tl.innerHTML=`<div class="todo-empty">${todoCat==='today'?'今天還沒有待辦，新增一個吧！':'還沒有其他待辦事項'}</div>`;
  }
  pending.forEach(t=>tl.appendChild(mkTodo(t)));
  const ds=document.getElementById('todo-done-section');ds.innerHTML='';
  if(doneT.length){
    const lbl=document.createElement('div');lbl.className='section-label';lbl.textContent=`已完成 (${doneT.length})`;ds.appendChild(lbl);
    doneT.forEach(t=>ds.appendChild(mkTodo(t)));
  }
}
function mkTodo(t){
  const d=document.createElement('div');d.className='todo-item'+(t.done?' done-todo':'');
  d.innerHTML=`<div class="todo-check" onclick="toggleTodo(${t.id})">${t.done?'<svg width="10" height="9" viewBox="0 0 11 9"><path d="M1 4.5L4.5 8L10 1" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>':''}</div><div class="todo-text">${t.text}</div><button class="todo-del" onclick="deleteTodo(${t.id})">×</button>`;
  return d;
}
function addTodo(){const i=document.getElementById('todo-input');const tx=i.value.trim();if(!tx){showToast('請輸入待辦事項');return;}state.todos.push({id:Date.now(),text:tx,done:false,cat:todoCat});i.value='';save();renderTodo();}
function toggleTodo(id){const t=state.todos.find(x=>x.id===id);if(!t)return;t.done=!t.done;save();renderTodo();}
function deleteTodo(id){state.todos=state.todos.filter(x=>x.id!==id);save();renderTodo();}

function renderStats(){
  const cur=Math.max(0,...state.habits.map(h=>h.streak),0);
  const best=Math.max(0,...state.habits.map(h=>h.best),0);
  const total=state.habits.reduce((a,h)=>a+h.totalDone,0);
  const daily=state.habits.filter(h=>h.freq==='daily');
  const wd=state.weekHistory.reduce((a,v)=>a+(v||0),0);
  const wp=state.weekHistory.length*(daily.length||1);
  document.getElementById('stat-streak').textContent=cur;
  document.getElementById('stat-best').textContent=best;
  document.getElementById('stat-rate').textContent=Math.round(wd/wp*100)+'%';
  document.getElementById('stat-total').textContent=total;
  renderCalendar();
}

let calYear=new Date().getFullYear();
let calMonth=new Date().getMonth();

function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderCalendar();}
function calNext(){const n=new Date();if(calYear>n.getFullYear()||(calYear===n.getFullYear()&&calMonth>=n.getMonth()))return;calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderCalendar();}

function renderCalendar(){
  const now=new Date();
  const label=document.getElementById('cal-month-label');
  if(!label)return;
  label.textContent=`${calYear}年 ${MON[calMonth]}`;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  const dayHdrs=['日','一','二','三','四','五','六'];
  dayHdrs.forEach(d=>{const h=document.createElement('div');h.className='cal-day-hdr';h.textContent=d;grid.appendChild(h);});
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const dailyH=state.habits.filter(h=>h.freq==='daily');
  const total=dailyH.length||1;
  // Build lookup from calHistory
  const hist=state.calHistory||{};
  for(let i=0;i<firstDay;i++){const e=document.createElement('div');e.className='cal-cell empty';grid.appendChild(e);}
  for(let d=1;d<=daysInMonth;d++){
    const cell=document.createElement('div');
    const dateKey=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cellDate=new Date(calYear,calMonth,d);
    const todayDate=new Date(now.getFullYear(),now.getMonth(),now.getDate());
    const isToday=cellDate.getTime()===todayDate.getTime();
    const isFuture=cellDate>todayDate;
    cell.textContent=d;
    if(isFuture){cell.className='cal-cell future';}
    else if(hist[dateKey]!==undefined){
      const pct=hist[dateKey]/total;
      let cls='pct-0';
      if(pct>0&&pct<=0.25)cls='pct-low';
      else if(pct>0.25&&pct<=0.6)cls='pct-mid';
      else if(pct>0.6&&pct<1)cls='pct-high';
      else if(pct>=1)cls='pct-full';
      cell.className='cal-cell '+cls;
    } else if(isToday){
      const doneCnt=dailyH.filter(h=>h.done).length;
      const pct=doneCnt/total;
      let cls='pct-0';
      if(pct>0&&pct<=0.25)cls='pct-low';
      else if(pct>0.25&&pct<=0.6)cls='pct-mid';
      else if(pct>0.6&&pct<1)cls='pct-high';
      else if(pct>=1)cls='pct-full';
      cell.className='cal-cell '+cls;
    } else {cell.className='cal-cell no-data';}
    if(isToday)cell.classList.add('is-today');
    grid.appendChild(cell);
  }
}

function renderReminders(){
  const pw=document.getElementById('perm-banner-wrap');
  if('Notification' in window&&Notification.permission==='default')pw.innerHTML=`<div class="perm-banner"><span class="perm-text">需要通知權限才能傳送提醒</span><button class="perm-btn" onclick="requestPerm()">授權</button></div>`;
  else if('Notification' in window&&Notification.permission==='denied')pw.innerHTML=`<div class="perm-banner"><span class="perm-text">通知已被封鎖，請至瀏覽器設定開啟</span></div>`;
  else pw.innerHTML='';
  document.getElementById('global-notify').checked=state.globalNotify;
  document.getElementById('daily-time').value=state.dailyTime;
  document.getElementById('sleep-time').value=state.sleepTime;
  document.getElementById('sleep-time-sub').textContent=`每天 ${state.sleepTime}`;
  const rw=document.getElementById('habit-reminders');rw.innerHTML='';
  state.habits.forEach(habit=>{
    const c=document.createElement('div');c.className='remind-card';
    c.innerHTML=`<div class="remind-head"><div class="remind-name">${habit.name}</div></div><div class="remind-row"><span class="remind-label">提醒時間</span><input type="time" class="time-input" value="${habit.time}" onchange="updateHabitTime(${habit.id},this.value)"></div><div class="remind-row" style="margin-top:8px;"><span class="remind-label">開啟通知</span><label class="toggle"><input type="checkbox" ${habit.notify?'checked':''} onchange="toggleHabitNotify(${habit.id},this.checked)"><div class="toggle-track"></div><div class="toggle-thumb"></div></label></div>`;
    rw.appendChild(c);
  });
}
function updateHabitTime(id,v){const h=state.habits.find(x=>x.id===id);if(h){h.time=v;save();renderHome();scheduleAll();showToast('提醒時間已更新');}}
function toggleHabitNotify(id,v){const h=state.habits.find(x=>x.id===id);if(h){h.notify=v;save();scheduleAll();}}
function toggleGlobalNotify(v){state.globalNotify=v;save();if(v)requestPerm();else showToast('已關閉通知');}
function saveDailyTime(v){state.dailyTime=v;save();scheduleAll();showToast('已儲存');}
function saveSleepTime(v){state.sleepTime=v;save();scheduleAll();document.getElementById('sleep-time-sub').textContent=`每天 ${v}`;showToast('已儲存');}
async function requestPerm(){
  if(!('Notification' in window)){showToast('此瀏覽器不支援通知');return;}
  const r=await Notification.requestPermission();
  if(r==='granted'){state.globalNotify=true;document.getElementById('global-notify').checked=true;save();scheduleAll();renderReminders();showToast('通知已開啟！');}
  else showToast('通知已被拒絕');
}
function scheduleAll(){
  if(window._ht)window._ht.forEach(t=>clearTimeout(t));window._ht=[];
  if(!state.globalNotify||!('Notification' in window)||Notification.permission!=='granted')return;
  const now=new Date();
  function sched(ts,title,body){const[hh,mm]=ts.split(':').map(Number);const t=new Date();t.setHours(hh,mm,0,0);if(t<=now)t.setDate(t.getDate()+1);const tid=setTimeout(()=>{new Notification(title,{body});sched(ts,title,body);},t-now);window._ht.push(tid);}
  state.habits.forEach(h=>{if(h.notify)sched(h.time,'好習慣提醒',`⏰ 該做了：${h.name}`);});
  sched(state.dailyTime,'好習慣','今天的習慣都完成了嗎？');

}

// ─── Colors ────────────────────────────────────────────────────────────────
const HABIT_COLORS=[
  {hex:'#2D5273',label:'深藍'},
  {hex:'#54728C',label:'鋼藍'},
  {hex:'#99B9D2',label:'淺藍'},
  {hex:'#3D7A6E',label:'松石綠'},
  {hex:'#545928',label:'深橄欖'},
  {hex:'#A2A63C',label:'橄欖綠'},
  {hex:'#C2A97A',label:'駝色'},
  {hex:'#8C6B4A',label:'暖棕'},
];
let selFreq='daily';
let selColor=HABIT_COLORS[0].hex;
let editingHabitId=null;

function renderColorPicker(){
  const cp=document.getElementById('color-picker');
  cp.innerHTML='';
  HABIT_COLORS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(selColor===c.hex?' selected':'');
    sw.style.background=c.hex;
    sw.title=c.label;
    sw.onclick=()=>{selColor=c.hex;renderColorPicker();};
    cp.appendChild(sw);
  });
}

function selectFreq(f){selFreq=f;document.querySelectorAll('.freq-opt').forEach(el=>el.classList.toggle('selected',el.dataset.freq===f));}

function openModal(editId=null){
  editingHabitId=editId;
  const modal=document.getElementById('add-modal');
  if(editId){
    const h=state.habits.find(x=>x.id===editId);
    if(!h)return;
    document.getElementById('modal-title-text').textContent='編輯習慣';
    document.getElementById('modal-save-btn').textContent='儲存';
    document.getElementById('habit-input').value=h.name;
    document.getElementById('habit-note').value=h.note||'';
    document.getElementById('habit-time-input').value=h.time;
    selFreq=h.freq;selColor=h.color||HABIT_COLORS[0].hex;
    document.querySelectorAll('.freq-opt').forEach(el=>el.classList.toggle('selected',el.dataset.freq===h.freq));
  } else {
    document.getElementById('modal-title-text').textContent='新增習慣';
    document.getElementById('modal-save-btn').textContent='新增';
    document.getElementById('habit-input').value='';
    document.getElementById('habit-note').value='';
    document.getElementById('habit-time-input').value='08:00';
    selFreq='daily';selColor=HABIT_COLORS[0].hex;
    document.querySelectorAll('.freq-opt').forEach(el=>el.classList.toggle('selected',el.dataset.freq==='daily'));
  }
  renderColorPicker();
  modal.classList.add('open');
  document.getElementById('habit-input').focus();
}

function closeModal(){
  document.getElementById('add-modal').classList.remove('open');
  editingHabitId=null;
}

function saveHabit(){
  const n=document.getElementById('habit-input').value.trim();
  const t=document.getElementById('habit-time-input').value;
  const note=document.getElementById('habit-note').value.trim();
  if(!n){showToast('請輸入習慣名稱');return;}
  if(editingHabitId){
    const h=state.habits.find(x=>x.id===editingHabitId);
    if(h){h.name=n;h.time=t;h.freq=selFreq;h.color=selColor;h.note=note;}
    showToast('習慣已更新！');
  } else {
    state.habits.push({id:state.nextId++,name:n,freq:selFreq,time:t,color:selColor,note:note,streak:0,best:0,totalDone:0,done:false,notify:true});
    showToast('新習慣已新增！');
  }
  save();closeModal();renderHome();renderStats();renderReminders();
}


function switchScreen(n){['home','todo','stats','notify'].forEach(s=>{document.getElementById('screen-'+s).classList.toggle('active',s===n);document.getElementById('nav-'+s).classList.toggle('active',s===n);});if(n==='stats'){renderStats();renderCalendar();}if(n==='notify')renderReminders();if(n==='todo')renderTodo();}
let _tt;function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2200);}

document.getElementById('add-modal').addEventListener('click',e=>{if(e.target.id==='add-modal')closeModal();});
document.getElementById('habit-input').addEventListener('keydown',e=>{if(e.key==='Enter')addHabit();});
document.getElementById('todo-input').addEventListener('keydown',e=>{if(e.key==='Enter')addTodo();});

checkNewDay();renderQuote();renderHome();renderTodo();renderStats();renderCalendar();scheduleAll();renderColorPicker();
</script>
